front:
  text: 序自震旦機蒙漢庭兆發大賢乘運繼軌貝葉重譯雲臻乃有四依愍彼五濁頻擊三空法鼓丕震一極宗雷迷途得附指南造修豁開覺路是以賢首祖翁法圓頓而立教遍攝羣經莫不有注天台尊者秉破異以提綱高懸金鏡拂彼遺塵其如世遠人湮微言就墜既乏台賢之實虗麗講演之名以致執塵時茫無所據負笈者又將安歸幸際先師崛起一令法運重興上承列祖嘉謨抉開攝生慧目性相始焉不紊台賢於是攸分第以法華流通獨乏本宗著述復原釋尊降靈本致再考諸佛說法通規根源檢在華嚴宗趣已明大鈔爰採彼旨為判此經自令大全彰誰云科含半意嗚呼正欲洪敷演義豈料忽命傳真四十年來寂寂那言手澤百千口內嘖嘖祇羨風規嗟我不辰及門也晚進退幾親道範往來四炙講筵詎獨聞見未多亦復荒庸特甚第既側法壇之末敢忘木本之恩每眷遺文嘆未合璧弗揣謭陋妄為續貂恨述義未工徒罹著糞之誚且落筆滯響實少振玉之聲謬充寶所初階乃為吾儕作俑罪難逭矣功實無之願得高明大為更訂務令輔教罔戾期與科章併垂云爾康熈歲在乙酉菊月望日秣陵後學智一謹識妙法蓮華經科拾目次懸談卷首弘傳序略義科文卷第一之上序品第一卷第一之下方便品第二卷第二譬喻品第三信解品第四卷第三藥草喻品第五授記品第六化城喻品第七卷第四五百弟子受記品第八授學無學人記品第九法師品第十見寶塔品第十一提婆達多品第十二持品第十三卷第五安樂行品第十四從地湧出品第十五如來壽量品第十六分別功德品第十七卷第六隨喜功德品第十八法師功德品第十九常不輕菩薩品第二十如來神力品第廿一囑累品第廿二藥王菩薩本事品第廿三卷第七妙音菩薩來往品第廿四觀世音菩薩普門品第廿五陀羅尼品第廿六妙莊嚴王本事品第廿七普賢菩薩勸發品第廿八
