body:
  text: 西蜀沙門佛間勗𠁼大師立科門人智一雪墩拾遺稽首無上尊蓮華修多羅文殊及普賢舍利迦葉等我以微劣智釋彼深固藏回此功德利普願受尊記將釋此經以懸敘義門及釋各解文總科為七門一教起因緣二藏乘分攝三義理分劑四能詮教體五宗趣被機六總釋名題七別解文義問凡遵賢首宗注經家皆用十門分別今何惟七答觀祖注華嚴時因見一文一句悉為結通十方以顯別教主伴具足之無盡故於注中乃用圓數以附本經結通無盡之旨此不共義也凡著述者如不暇深詳請閲藏祖心經及起信二疏懸示可知矣初因緣者夫聖人設教必有由致若須彌巨海大因方為搖動今搖如來融金之德山動深廣之智海非小緣矣故經云諸佛世尊唯以一大事因緣故出現於世所謂開示悟入佛之知見也今將大事因緣各開七義略示其槩而言七者為順七軸七喻義故先因七者一法應爾故二酬宿因故三順機感故四為攝末歸本故五開因性故六顯果德故七利今後故今初言法爾者夫聖智懸鑑十界齊收事縱未然終始已判是以乘逐機投益隨教異故我世尊御大願輪身現五濁而以十儀五教廣被一切同登覺岸無奈別有一類機宜初雖預入根本一乘法會之內而却如聾如盲毫無聞見是故世尊從本垂末初以三乘引攝待至成熟而以破異一乘開其知見令入佛慧故經云是諸衆生應以是法漸得入道又云諸佛世尊欲令衆生開佛知見使得清淨故出現於世等皆法爾義也二酬宿因者夫法運之開端由曩修之篤厚苟悟佛性之至同自愍羣蒙之忽異非憑先覺曷拔後昆是用大悲流演巧為導引以酬宿因宿因雖多不出願行二種初願力者經云如我昔所願今者已滿足化一切衆生皆令入佛道此正以説法華為酬宿願耳二行力者經云我所行佛道普欲令衆生亦同得此道又云故為大國王勤求獲此法遂致得成佛今故為汝説皆以今之所説而酬昔行也三順機感者夫聖無常應享於克誠雖曰應由於感而必能應體中先具一種隨緣勝用方不虗其所叩故經云佛知彼心行故為説大乘則知彼為説即順感意也四攝末歸本者謂攝末由於垂末而垂末必有能垂之本五經云始見我身聞我所説正指在昔曾説華嚴以為教本次為未解者以同教一乘融實為權説三乘法調其劣根至成熟位引入佛慧此則今經自具一種攝末之力牽起自體以為親因其垂末之功亦自屬於同教矣若統論此經力用應有二種一者望前能攝在昔枝末法輪所被之機令同於己得聞此經二者望後由攝末己即隱己力與被初入同為所引隨彼能同能引入於華嚴佛慧此即歸本力也問法華自有佛慧何以遠指答此彼佛慧本無二致由經云我今亦令得入佛慧之語意則明是率後歸前如同路者未有後至不隨前導者來是故華嚴其猶大海能納衆流而此經如大海口能攝衆流復能令有所歸收功勝大五開因性者謂如經説佛知佛見及廣大之壽量皆緣衆生性本自具若性非金玉雖琢不成寶器良以衆生抱性德而為體依智海以為源但相變體殊情生智隔今令知心合體達本忘情故談斯經以為顯示所謂諸法有如是性如是相等故須開也開示義下法説中當為廣顯六顯果德者夫凡情未盡聖境難窺一遇非常茫然無措故剎那內訝八歲之疾成而伽耶中昧久如之遠證不蒙聖諭曷曉玄微況加王子之覆講燃燈之得記寧不直覆遠本是故地湧多耆真同父少子老無怪補處之猶迷也及聞説廣大之壽量方悟果德之難思其領益者甚至得一生速證無上者以一四天下微塵數計遂令會衆發願思齊七利今後者謂諸衆生既等有佛之知見佛之壽量是故現未廣利無邊然在法會聞説者固已得益至佛滅度後並今之見聞全經下至一偈一句者悉入如來懸記光中咸由經功之所致也第二明説經緣者謂一切經首説時方人等皆是緣也亦有七種一者依時二者依處三者依主四依三昧五依現相六依請者七依聽者今初夫聖本無生應成嘉會必大有所益此彼緣熟然後乘時啓運而羣生咸趨矣是以大通十劫靜坐我佛三七思惟皆待時也時至教興非偶然矣故云所以未曾説説時未至故又云今正是其時決定説大乘等問真文不泯靈境恆存故顗大師得法華三昧時見靈山一會儼然未散復何興廢之有答此乃深信解相若論釋宮之一降鷲嶺之三周自屬告成非所類也第二依處者夫證窮真際則能所雙亡俯應羣機則依正宛爾曰染曰淨乃自乃他皆涉世之芳規度生之善巧也何則非現身無以攝歸來之志非嚴土無以憩趨向之蹤故必控馭靈境乃可托其迹而怡其神也故經云我從成佛已來常在靈鷲等明依處也問大經云佛身充滿於法界何云常在靈鷲答豈不見即此偈下句云普現一切羣生前乎又須知佛身雖周法界攝機常在此山且如此土清涼一山因大孚靈鷲尚得稱為三千之最況今正屬佛土乎又可為未能直解唯心者示有一定之趨也問今説此經處為染為淨答就佛而言則優劣齊驅隨機而見則染淨殊分經云衆生見劫盡至天人常充滿等亦如六道同見一水須知忘染淨見者始能具見染淨其隨染淨中者則不能此彼互見矣私謂無論大小二乘凡未得變易身已前其所見之土大約隨所居之同分而見故三根所見同是五濁以聖道但能滅惑不滅報故又須知三變淨土非待佛來正應機耳若通論所見應有四句一唯見染即未離分段大小二乘人所見者二唯見淨即已得變易大小二乘人所見者三染淨具見即佛應身隨機同見之土四俱泯即約佛自分言以染淨相盡故又上二句且據權教未回心未入實者言之若已入正定聚者即得少分同佛所見以能知法如幻故然亦有二種若未斷結者當於入觀時得同佛見若已斷正使者無論出觀入觀俱可少分同佛所見復有四句一唯染謂娑婆覆淨相故二唯淨謂三變後所見故三亦染亦淨謂於三變處復見大海龍女故四非染非淨謂法性土中尚無有淨復何言穢若再約鷲嶺一山言之應更有通局四句一唯局謂具五濁者所見故二唯通謂佛之常隨衆能知此處即法界性故三亦局亦通即約一人於未開解及已開解時所見有廣狹故四非通非局謂性相本來交徹故若更約成壞言亦應復具四句可以意得則共有一十六句矣第三依主者夫真身無身妙相無相猶摩尼之本淨似靈鑒之多含故得同時別見優劣齊彰或次第隨緣而殊方各見則所陳所見悉緣機解之來儀欲擬大聖應作是説今説此經佛自應隨機定身乘身辨教始無差舛若約八相始終應正屬化若據理進論雖非圓滿十身亦是真應相融三身圓現之化佛也大抵餘經被機莫不小則始終俱小如四含等所見之化佛大則終始定大如梵網等所見之報佛獨今法華迥異餘教以未開解前始自鹿園迄至鷲嶺其所見者不啻天淵如經云即脫瓔珞更著粗弊其隱勝現劣之旨張於云脫云著之間矣及開知見與授記時其委付家業之長者仍是在昔著弊之前身而了不見有脫弊著御之文者由法眼清明時便見真應無礙何處更有弊御之狂華哉故經云是法住法位世間相常住世相尚得常住何況佛身又云以三十二相用莊嚴法身非真應鎔然之謂歟然三身料簡應有四句一化非真謂八相之化佛經云皆謂今釋迦牟尼佛出釋氏宮去伽耶城不遠等二真非化謂以法性身住法性土者是經云無有生死若退若出等三亦真亦化即開解後所見真應相即之身四非真非化經云遙見長者於其門內施大寶帳踞師子牀者是指勝應言也第四依三昧者謂聖人説法必先入正受者略有三義一示軌後徒明將有説二靜鑒前理使受者心篤三緣衆生久翳塵勞非先蒙正受冥加俾聽者洞契真源烏能截其流妄故定後之言能令疑網迎刃而解問今説此經端依何定為勝增上答有二義一云大疏指為無量義定一云法華三昧謂此一經統以破異為宗今所説者既是實相妙法其所依者必是實相妙定中表一如夫復何疑是故得此三昧者便見靈山一會儼然未散今經雖無入定明文然引理據事除此之外別無可憑問世尊既已出定説經復何知其更入答極果聖人已離散動其見有出入者並因機設況出入無礙動靜一源乎第五依現相者夫法性寂寥本無諸相無相之相不礙繁興起教多端相非一準或放光動地或花雨香雲皆為發起今經發起自有二種一以説經入定雨花動地為遠發起二以所放白毫相光二大士之問答為近發起故經云今佛放光明助發實相義等第六依請者謂若約慈悲深厚則無問自説經云無問而自説等若約尊法重人篤其誠信必須待請乃説經云汝以殷勤三請豈得不説第七依聽者夫説法者皆因人而篤然在當機多因為衆咨詢是以説者請者端為聽者弄引作緣雖曰緣有近遠益有淺深其實塵勞業惑終因斯脫經云乃至能聞此經一偈一句者我皆與授阿耨菩提之記是知今日之記莂固是智勝之遺塵又須知今日之餘績又是他日之首出已上因緣雖有親疏併皆有力發起聖教知因親則增長實智成自利益知增上之能助則發權智成利他益庶內外障寂永得見佛聞法矣第二藏教所攝者初明藏攝次明教攝初中復二先藏後攝先明藏者含藏義也以能含攝所詮令不散故然藏有多種略而言之則唯二三言二藏者謂世尊應機説法根雖無量統而為言不出大小二乘故結集家以乘從人名曰小乘藏大乘藏言三藏者謂聖教所詮不出三學則詮戒者名毗奈耶藏詮定者名修多羅藏詮慧學者名阿毗達麼藏雖皆各有兼正而結集者並以少從多各歸能詮第二明攝亦二者初教法二教儀言教法者謂諸宗立教不同具如大疏所詳今以賢首大師所立五教為所宗尚者以其理致極圓備故即小始終頓圓之五也其釋名意義亦如大疏所載並不繁述次明攝者今此一經能罄如來出世本懷正明終教極則妙旨若教若理若行若果盡撤底蘊如言教則曰若聞此經一偈一句皆當與記作佛言理則世間生滅相當下常住言行則舉首低頭皆成佛因言果則八難性空龍女入證要之事得理融並皆稱實是為極則若以兼涉而論如言小則出諦緣於化城言始則智積執相疑人言頓則龍女入證直廢階差言圓亦如龍女之變相速證又於圓融中不廢行布矣又云我有無量無邊佛智慧樂喻中又云我有如是七寶大車其數無量皆於法喻中略示主伴之旨耳第二教儀者儀乃有十列名釋義亦如大疏彼判説今經儀以先小後大故正在攝末歸本門中收以所説者是破異一乘故亦分屬本末無礙門又如聞提婆達多品時由三與一相和合故令無量衆生得阿羅漢果無量衆生悟辟支佛恆河沙等衆生發無上道心等此由如來法雨難思權實無礙故令聞者隨分受潤或作三解或為一取乃是本末此彼無礙第三義理分劑者已知此經正屬終實兼詮餘四何以得知此中之分限夫一雨普滋則諸乘並作日輪返照則異轍同歸是以本末交映權實雙施於一佛乘分別説三雖復説三常為一事斯則義門無量咸由此法妙於隱顯之所使然今以管見仰承理教擬開三門初舒光發軔問答智境頓示始終門二約近迹垂化開權顯實令悟一乘門三約本果顯德拂迹入玄令廣流通門初中復二初擬張教網二承光歷示今初擬示能化之法由經云各於世界講説正法雖未明指何等法門但以佛佛道同得以我佛所説者準而擬之謂諸如來應如我佛初成正覺時即以廣狹無礙染淨相融之一處舒卷自在念劫圓融之一時於此時處同演梵音流出若顯若密無邊契經海廣被一切難思會衆然密部中亦應有五教之別非今所論茲於顯教略示二門以見種種初分相門二該攝門言分相者先將如來一代所説小始等五教且總合為一乘法門以皆是諸佛一大善巧攝生方便之所流故次約增數漸開者謂從一乘開之為二此復有三一對小顯大則初是小乘即半字教後四皆大乘即滿字教也二對權顯實則前小始二是三乘教後終頓圓是一乘教三終頓二教雖則泯二異前而皆對三顯一曲順機宜後一直顯本法乃名一向不共此則初約半滿次約權實後約曲直各分為二類三或分為三初一小乘次一三乘後三一乘或後一是不共一乘若合初二則是三乘一乘便順四乘以許光宅之判或分為四此復有二一中間三教由始教存三終教泯二別故開之為四一別教小乘如四含等二同教三乘如深密等三同教一乘如法華等四別教一乘如華嚴等二歷位無位開漸及頓故分為四一小乘教二漸教謂始終也三頓四圓此上初約存泯義為四二約頓漸亦開為四五或分為五即藏和上所立之教以於漸中開出始終故有五也二該攝門者謂諸三乘本來悉是一乘故何則若以三一兩互相望便成二門謂不一與不異也問若彼三與一不一者未知彼三為存為壞若存如何唯一若壞彼三乘機更依何法而得進修答有四句故一由即一故不待壞二由即一故不礙存三由即一故無不壞四由即一故無可存由初二句彼三乘機得有所依由後二義彼方入一由此四句俱即一故是故唯有一乘更無餘乘此上分相該攝二而不二是為頓彰教網義大經云張大教網於生死海漉人天魚置涅槃岸又經云以一味雨潤於人華各得成實皆其意也上於光中擬諸如來所説之種種法門能令諸菩薩聞之而有種種因緣種種信解種種相貌行菩薩道及彼三乘並皆攝入一乘以示出定説一之前兆二乘光歷示者謂世尊欲於上教網所被機內別有一種漸機已經多方調攝至成熟位即應得聞一切世間難信之法是故先現希有光瑞以發其軔俾生渴仰進祈有聞而文殊大士乃先於答問中悉將古佛開顯授記唱滅等事以擬今佛之當同則在昔之正宗轉為今日之發起是故定後所有開顯等事並不出於答問之外茲為略示光中圓現之旨而有其三初直示本光二含攝正宗三映帶流通今初直示者謂諸二乘高推聖境卑視己靈以三界為畏途等二利於他有是故世尊特示妙光從一毫現令悟無邊剎海不離毛端聖凡因果不出自心而又承佛威神得遠瞻見種種奇特皆在當下其迷之者猶謂是佛神力殊可慨也二含攝正宗者謂如點能詮之名則曰是時日月燈明佛説大乘經名妙法蓮華又曰以是知今佛欲説法華經豈不與正宗之汝當宣説妙法華經之名兩相符合其點所詮云演説經典微妙第一其聲清淨出柔軟音而正宗舍利弗言聞佛柔軟音深遠甚微妙又云能生淨妙第一之樂等又云佛坐道場所得妙法為欲説此為當授記皆已含正宗之旨矣三映帶流通者謂如云佛滅度後妙光菩薩持妙法蓮華經滿八十小劫為人演説與今藥王等諸菩薩之流通正相等矣是知此經三分並重頗異餘教特緣此耳所以必分三者令知始末故各有所顯故初中後皆善故豈非一經之始終皆不離於一光耶問光有幾種答有二種一名常光此從如來全體金剛內外明徹清淨所生並不須放故世尊行住坐臥有常光一尋也二是所放之光若以今經比推亦應有二謂一是神通光明凡諸佛菩薩為度善根成熟衆生即放此光能令見者滅罪增福徹通障外雖遠如近而所有事業僅在初三界攝二如今經所放之光即可稱為希有與尋常所放者大有不同處何則凡諸世尊身現五濁化緣將畢始放此光令於一根全領六根所得之境生希有心發大歡喜言得六境者如見生死所趣乃天眼所得之境今於肉眼見之善惡業緣乃宿命所得亦得之於肉眼種種因緣求佛道乃屬他心亦得之於肉眼能令即遠即近則如意通得之於肉眼聞補處法門則增進漏盡矣使非以不思議神智加之於內焉能令諸法會藉一光之照即一眼根而兼六通三明之用耶故是希有光也二約近果垂化開權顯實令悟一乘門者如經云如來為太子時出釋氏宮不遠坐道場得菩提始過四十餘年此近果也而為一類漸機初以一乘作三乘説至成熟位仍復攝三歸於一乘所謂開顯也然欲知開顯義者使弗先達權實雙融本末無礙之旨則權自權而本自本矣更何開顯之有今略明之文三初約法説直顯一乘二約喻明本無三乘三為止息示説三所以初二初明權實雙融二正明開顯今初雙融者謂上教網內有一種為實施權從本垂末小大互陳半滿疊湊之教莫不寓實於權以成三乘然在小乘俱然易了而大乘中則有多種分別且如於一般若會上或時權實雙明或時帶權説實以本欲説實猶根尚劣故或時帶實明權此垂一於三漸引成根故又或於思議淨名中斥權贊實熏染成性令其思齊嗚呼自責又勝鬘之開顯小似今經蓋令坐而不進者不滯於權亦先為今經弄引也此上法門並皆融實於權作開導依破其沉寂待至靈山易於融會使其一蒙開顯便知昔三本是一實則於不一不異之旨其猶氷水之渙然故經云於一佛乘分別説三又云雖復説三乘但為化菩薩皆融實於權會權於實意也此外復有一種不滯方便深明性相平等之教亦傍為此經作引攝緣者更有始終俱大如首楞嚴終始俱小如四含者皆緣機有奮迅超越之異即與此經了不相蒙各是一類二正明開顯者謂今一乘體上自具一種破異殊力能令教理行果四法各具開顯等義迥異餘經故古疏約廢立開顯會為會歸八字以論通局而有二義初泛論通局次尅定去取初泛論中復有初通後局二義言局者如初約廢立義望教法上明廢三立一者謂以今經望昔日實教外而有一種能廢昔三別立今日一乘之旨以昔之三乘但有假名故經云但以假名字引導於衆生又云世尊法久後要説真實故又此教上自含二義一局定可廢義故今廢之二能詮為因義則不可廢故下文於開字能通四義中收之二約開顯義望理法上明開三顯一者謂若言有三則一極之理自隱若開無三理則一極自彰矣三約會為義望行法上明會三為一者謂在昔之行各趣自果今則融會同為佛因以舉手低頭尚為佛因而況諦緣度等四約會歸義望果法明會三歸一者謂三乘斷惑所得之果但是三昧今則會通同歸一乘而作極果之因又上廢義若望果法亦有二義一約果相虗設則可廢二約奪果成因則不可廢今用後義奪權果以為一乘因也次言通者唯廢一種則止於教其開顯會為會歸等並通教等四種今先明開字通四者約教則昔為三人説三乘法今云無二無三昔言有三是方便門閉於一實今無二三則一乘自顯故云此經開方便門示真實相此約上為因能詮不可廢以明開也以世諦語言尚得不背實相況三乘教耶若約理者昔説三理謂各別證今示法身是同更無異味昔言有三則方便門閉於一實今云無三則一理自顯亦開方便門示真實相也若約行者昔説三乘之行行各不同諦緣度等隨修各異今得並為佛因謂三乘行別則方便門閉於一實今會為一則方便門開一實自顯故云汝等所行是菩薩道若約果者昔説三果不同是方便門閉於一實今云諸聲聞衆皆非滅度心生歡喜自知作佛則實相顯矣上釋開字竟若例會為通三者則會三種別理別行別果皆為一理一行而三果即轉為能成一果之因若例會歸通三者則會昔三之理行果歸今之一咸成妙理妙行妙果矣二尅定去取者又二初約簡取理行明會三為一二簡去教果明會三歸一今初言會三者昔説三理謂各別證而三行亦各趣自果今為會云法身是同無別異味則一理自顯汝等所行是菩薩道則一道出離之因亦得自顯詎非指權即實而會為之功非他經所能有也上皆約三乘望一乘豎論會三為一也此外凡大乘諸教若未經會雖實亦權以實外有權故若已經會雖權亦實以權外無實故二簡去教果明會三歸一者又二初會昔成今以明四乘二彰今異昔以明四乘今初言會昔者由昔之三教互不相見故名為權則三外之實教大乘雖亦深明實相佛性等旨而不兼會昔權故教可廢設許二乘依此取證作佛亦不兼權故果可廢但如𠁼字中之一點斷非是伊之全體故皆可去今經不然而能約教則收盡世諦語言約理則世相皆常約行則聚沙畫葦皆為佛因約果則八難性空龍女速證斯又何止指權為實而窮盡法界無非第一義諦矣故此會取之功誠如攬點成𠁼除三之外別無一實雖説四乘而實義説為四但三為別而一為總耳此約三乘自體橫論互望處以各別者名權可廢其能互望者方為所立之實也二明彰今異昔者謂前但合三為一以明有四其實一無別體今辨一乘別有法門則四義昭著是故經云昔所未説而今説之能令法會聞所未聞得未曾有以至三根皆得授記甚之不在會者亦令轉為宣説一切衆生皆是吾子愛無偏黨則唯實無權而另顯實有一乘之體之旨乃足正所謂對三所立之一命行者直悟一乘而後已則光宅四乘之旨亦不越此火宅門外唯見大白之車耳三為止息申明説三所以者謂世尊昔於智勝所自與諸子覆講令發大心結緣已來無奈旋發旋退中間止得復以種種方便將之護之不令散失師弟常俱今雖相值復隨先心所好授以權小法門令先成熟未敢直陳所懷是以抑於四十餘年之久開顯於五千退席之後無奈會衆數逾恆沙而領解得記悟本心者僅唯五人餘仍執曰若實無三乘者我等何以得出火宅至安隱地洵非虗也又既無彼三昔者何不直顯一乘之為快也於是內懷疑惑坐而不進是故世尊為説在昔令發大心熏已成種因緣須知此等種子勢力如被吞之金剛不但不與五濁雜穢同居且要透過三賢十聖之異熟至坐道場而後已自爾已來宿緣所追互相冥感中雖退大此種不失加以歷劫內外熏淘之力今既成熟合為開顯俾其仍歸一乘以副本懷復次三果雖似實有但以爾等久受熱惱令出火宅以三昧力法爾自當頓獲清涼似涅槃界若以極果望之不過但離界內虗妄名為解脫其實未得一切解脫正如導師為欲止息疲勞以巧方便而於中途化無為有示現城郭令其暫息意在更令前進至珍寶處而後已庶不負發足之初心耳故經云唯有一佛乘息處故説二今為汝説實乃至云具相三十二乃是真實滅又云既知是息已引入趣佛慧則千年積暗一燈頓破而三乘之果豈真有哉三約遠果顯德拂迹入實以廣流通門中二初約正報拂顯以廣流通二約依報拂顯以廣流通今初夫理智合則體用融佛道成則身雲現故身恆之壽亦豎窮於三際矣但以能見之眼根有圓有缺便謂佛壽有修有短有生有滅是故世尊於開顯之後復恐執今日入塔唱滅之迹便以為實真取滅度故藉地湧多衆以為發起作師子吼顯廣大之壽量其略曰我本行菩薩道時所成壽命復倍上數又況果中之所得者詎不湛然常住直窮三際由此便拂入塔唱滅之迹令知雙林之取滅非實滅也不獨聞者發願思齊且更興起弘經之大願矣又本師入塔分坐可拂生滅隔世之迹得顯三際平等古今之一如矣亦可表始本不二甚深之體用又召集分身可拂娑婆一化之迹以顯妙應周普之實至龍女之作佛調達之得記則男女相怨親想俱不可得矣又妙音之於事畢唱散之後而娑婆仍是木樹草座之穢土乃以四萬二千由旬之大身禮丈六之金身而却兩不相妨可拂勝劣小大之迹顯如理之佛身非小如幻之報體非大詎非法無定性之德所使耶又多寶塔門閉後妙音續來求見止聞贊善之聲並不開塔令見者可拂六根一向別緣之迹而顯六用圓融寶覺即在妙音一耳之內而六塵亦不越乎多寶一縷聲塵之外蓋由根塵悉從緣現所現依他本無自性况加持經之力六根已得清淨塔戶何能隔越故根之與境同得即一即六即色即聲即耳即眼此彼無礙而諸法平等之旨皆躍然而出矣二約依報拂顯以廣流通者謂多寶塔本地大攝性屬留礙今從地湧兩不相妨非性色真空法性融通之德相耶又三變淨土之後經中自云無有大海江河而龍王女却從海湧詣靈鷲山可拂實有淨土之迹而顯土體自在無礙之德矣又地湧大士贊佛之時劫經五十可拂説經九載之迹而顯時無別體隨處融通之實矣已上若依若正若時若處所以得有如是之難思難議者祇緣動靜一源性相俱離之所使持經勝力之所致也問何不約三變淨土神力等品義而説拂顯答今所明者惟約諸法當體所具之德相而言若約三變神力等者則凡具定通力者皆能少分於無示有化有為無乃業用邊事故弗取也第四教體淺深者謂如大疏所明無盡教海體性難思從淺之深列十種體以為能詮則一大藏重玄妙理並為所攝今經於彼應取何法為能詮之體於中有二初總攝二蘊次句數圓融今初謂無問如來在世及滅度後通取名句文聲四法以為能詮上之義理並為所詮此則通取假實以為其體雖如聞香悉能知等亦具諸法顯義之旨要非此中正義故弗取也故用大小二乘同所許者以為教體然大乘內析有三義一云攝假從實則唯以音聲為體以離聲外無別名等故二云名等為體以體從用故以能詮諸法自性差別為二所依故三云此四合為其體由前二説皆有理教為定量故故淨名云有以音聲語言文字而作佛事者本經云我以無數方便種種因緣譬喻言辭演説諸法又云若有忘失一句一偈我當教之與共讀誦則一經始終皆以名句文聲以為體耳二約句數圓融者梵行品云知一切法即心自性故上四法皆唯心現然以諸教相對則有本影四句一唯本無影謂諸小乘見佛從外來不達唯識故唯有本質二亦本亦影謂大乘初教以佛自所説若文若義皆是如來妙觀察智淨識之所顯現為本質教於聞者識上所變文義為影像教三唯影無本謂大乘實教離衆生心無別佛果色聲功德唯如如及如如智獨存大悲大智但為增上令所化善根成熟衆生心中現佛色聲説法聞者識上自然影像顯現故今靈鷲一會所見所聞皆善根成熟衆生心中所現之大用也華嚴云諸佛無有法佛於何有説但隨其身心謂説如是法即其義也四非本非影謂頓教説非直心外無佛色聲即衆生心中影像亦空華嚴云法性本空寂無取亦無見此上四句由淺之深攝末歸本其第四句即以無遣之遣而為其本也又若正約今經説聽全收者亦有四句一唯説無聽謂佛真心外無別衆生以衆生真心即佛真心故其第二唯聽無説句返上可知三説聽雙存者謂佛真心現時不礙衆生真心現故四雙泯者謂佛即衆生故非佛衆生即佛故非衆生此則互奪雙亡説聽俱泯矣淨名云夫説法者無説無示其聽法者無聞無得由初四句三乘權教得有所依由後四句一乘實教得有所依是故此經正屬終實兼詮頓旨皆能詮之力也第五宗趣被機中分二初明宗趣次明被機今先明能被之宗趣者謂語之所尚曰宗宗之所歸曰趣大疏總立十種宗以收一代聖教即第一我法俱有宗二法有我無宗三法無去來宗四現通假實宗五俗妄真實宗六諸法但名宗七三性空有宗八真空絶相空九空有無礙宗十圓融具德宗然此十宗後後深於前前以前四唯小五六通小大後四唯大故又七即法相八即無相後二即法性宗又七即始教八即頓教九即終教十即圓教今經正屬二諦無礙宗如經是法住法位世間相常住又云諸法寂滅相不可以言宣當又云以方便力故為五比丘説則無相不礙相無言不礙言皆空有無礙義也上即通義若就今經別言者當以開示悟入為宗令乘一乘為趣若以開權顯實為宗則以授記作佛為趣或以攝末歸本為宗則以令入佛慧為趣又若以拂迹顯實為宗則以令廣流通為趣二明所被機宜者夫教因機設乘逐機投離機説法無所用故上之宗趣未知以何等法器乃能堪受故今直顯所被通有十類於中前五揀其非器後五彰其所為前五者一揀無信非器聞生謗故二揀違真非器依傍此經貪求名利不淨説法集積邪善成魔業故三乖實非器如言取文超情至理不入心故四狹劣非器謂諸二乘五守權非器謂三乘共教諸菩薩等隨宗所修行位不解理事無礙法門故不得名為真實菩薩後五明所被者一正為即現前回小向大諸聲聞衆二兼為即於此經雖有見聞不能當下悟入亦得仰信熏染成種至成熟位縱在海水劫火亦不為障如龍女等三引為即前權人不信實法故將實教行位名字寄於權教之內引攝成根經云先所出內是子所知等四權為即是二乘謂既不聞況於受持故諸菩薩外示凡小或臨聞退席或被移他土或被斥慕大等五遠為謂諸凡夫外道闡提悉有佛性今雖不信後必當入華嚴云如來智慧大藥樹王唯除二處不能為作生長利益所謂二乘墮無為坑及壞善根非器衆生溺大邪見貪愛之水然亦與彼曾無厭捨又彼明不信毀謗亦種善根謂謗雖墮惡由聞歷耳終有省悟即不輕所化之輩是也第六總釋名題中二初經題二人題今初古注云此題法喻合名直詮諸佛出世本懷衆生本心自有生佛以來便有此名窮過去世無立此名者盡未來際此名不可廢不過轉相傳受諸佛以此開示衆生以此悟入三周之義悉攝於此則妙法是法説蓮花是喻説法喻中皆含因果是因緣説等塵餘云法該教理行果四法圓融故稱云妙諸佛如來時乃説之此教法也乃至治世語言皆順正法究竟皆得一切種智由教之妙而妙於理行果也道成久遠即燃燈亦屬中葉而今復以釋迦施設由果之妙而妙於教理行也四種之教豈可思議哉天親菩薩謂大乘有十七種名妙法蓮華乃十七之一有二種義一出水義謂出小乘泥濁水如諸菩薩坐蓮華上聞説如來無上智慧清淨境得證如來深密藏故二開敷義以諸衆生於大乘中其心怯弱不能生信是故開示諸佛如來淨妙法身令生信心故此法之妙唯蓮華足以況之故舉妙法喻若蓮華等大鈔引睿公序云華有三時之異華而未敷名屈摩羅雕而將落名迦摩羅處中盛時名芬陀利生公亦云器像之妙莫踰蓮華蓮華之美榮在始敷始敷之盛則子盈於內色香味足謂之芬陀利等大經十地品蓮華出現具明十相中其第七相云此華恆放光明普照法界疏云第一義相正觀普照法界現事故如世蓮華開敷萏為第一故鈔云華有三時之異今非初後正處中盛時正觀普照等彼流光法界現事如開萏披敷見蓮華實雙美理事昭著權實開榮今説妙法取喻蓮華其第一相與彼無異等宗鏡引法華名相云經云色涅槃受想行識涅槃此中亦然色法華受想行識法華經云色非染非淨色生般若生色性虗微名妙色體自離假名為法色無塵垢借喻蓮華文字性空目之為經經者以身心為義如來在乎陰界陰界即如何異之有等拾云大凡諸佛出於五濁為欲引攝先小後大之機必説妙法令入佛慧但由機有利鈍故須三番開顯又此三中初即為實施權義如為蓮故華二即開權顯實義如華開蓮現三即攝末歸本義如花落蓮成故説妙法取喻蓮華此上開顯並屬所詮其能詮體上以能具足貫攝常法四種勝用乃名能詮妙法蓮華之經也二人題麈餘云姚秦代名前有嬴秦苻秦後有乞伏秦故以姚姓別之即姚興時也雖正統屬東晉什公譯經在於後秦境內法王一界唯一位稱至尊法師則隨時隨處隨人隨位可為之所以助佛行化能師於法而師一切衆生也龜茲國名在焉耆國西南沙門云勤習三藏經律論三師皆能通之具云鳩摩羅什婆云童壽什者文擅兩方義通華梵之美稱也公以偽秦弘始八年夏於草堂寺奉秦王詔翻梵成華故曰譯緣起並如本傳妙法蓮華經弘傳序略義終南山沙門道宣述秣陵後學智一釋經題如前釋序名弘傳者弘廣也傳轉也意謂我見支那受持聖教者未若此經之廣布以故轉述序其盛傳俾諸後知所宗尚流通於無盡今但直釋本義凡舊注之偶失惟詳對者自辨妙法蓮華經者至具如序曆故所非述一序大段有三今先明傳譯時年者以見若人若法皆可考也首句總挈一經大綱妙等六字牒召體之名下九字顯所詮之用能於一代教中統述諸佛用權之本意佛言諸者以本師是諸佛中之一故舉諸言即該釋尊大凡諸佛降靈五濁莫不因種種機説種種法於中自有一類三乘須先以覆相權説調攝善根令熟後以此經開顯在昔設教本致蘊結下槩論兩土流通也蘊結即結集義大夏是天竺美稱震旦乃彼土目此方也樓炭經云蔥河以東名為震旦以初日出耀於東隅故昔如來滅後阿難尊者將佛世所聞之法皆蘊聚炳著於心書之貝葉而出流通大夏已千餘齡及騰蘭東傳除未翻前從初譯後迄作序時流通震旦又三百餘載矣西晉下別序此方三譯也西晉乃武皇帝司馬炎受魏禪即帝位乙酉改元泰始國號晉都洛陽以建康在東望之故曰西晉惠帝即武帝第二子庚戌即位改元凡七永康是第三改元也長安古稱咸陽昔漢高帝見其山河百二子孫可以長享平安遂建都而改今名青門乃長安東壩城門舊邵平種瓜處燉煌境屬雍州漢為燉煌郡竺曇摩羅剎云法護月支國人泰始二年丙戌自天竺達玉門關來居於此時人尊其德諱其名故指所居而稱曰燉煌菩薩初譯此經名正法華十卷一百八十九紙東晉者五胡亂華元帝渡江都建康望洛陽在西故曰東晉凡十一主安帝乃第十主諱德宗丙申繼孝武即位次年丁酉改元隆安秦言後者緣前有氐人苻堅之父蒲洪擁師十萬自稱秦王長子健背有草苻字改姓苻晉孝宗七年辛亥即位長安改元皇始國號秦次年春稱帝其子苻生繼立不道堅與王猛謀置之別室而堅立改元建初後秦羌人姚萇之子興率衆伐之秦主登大敗次年甲午興即位改元皇初又改弘始史因二氏皆以秦名國故寄前後以別之龜茲國名在焉耆西南沙門云勤息鳩摩羅什云童壽於偽秦弘始八年長安草堂寺譯出今經七卷一百四十八紙必先書東晉者存正統也隋高祖姓楊名堅弘農華陰人陳大建十三年辛丑受周禪都長安國號隋因父忠纍官至隋國公故以隋名氏仁壽文帝年號也天竺正音印度此云月以此土賢聖繼軌導凡御物如月之照臨故名而云北者以竺有五國故別之闍那笈多二法師名也闍那具云闍那崛多云志德北天竺人笈多具云達摩笈多云法密南天竺人二師於大興善寺再得梵篋遂成後譯因見秦本立題括義無遺弗容移易所以同名妙法八卷一百五十五紙一經三譯不勝重沓文言旨趣交互陳列共贊大猷似無優劣但時之所宗人之所尚維秦本為多互陳者略如秦譯云唯佛與佛乃能究盡諸法實相所謂諸法如是相等晉譯則云如來皆了諸法所由從何所來諸法自然分別法貌衆相根本知法自然校什譯雖不逮而旨實陳也上序三譯之大槩如此然自此經外所有支品別偈如齊達摩摩提譯出提婆達多品經一本晉祇密帝譯出普門品經一卷隋闍那崛多譯出普門品重頌偈一卷如是品之與偈等莫不各有源流具如彼經本序紀其所自故所非述夫以靈嶽降靈至拯昏迷之失性此下第二大段正明乘時啓運而有三周之開顯初聯約理正明言靈嶽等者借詩維嶽降神生申及甫意而言靈鷲雲集之衆皆蘊英靈之秀而降生者自非吾佛大聖曷能開化於彼下句明所化雖是羣哲苟非昔有勝緣亦必不能引導其心而成師資能所化導下聯承上約事申明仙苑者因古仙居此得名亦即鹿苑金河是産閻浮檀金處顧命者鄭玄注尚書顧命篇云臨終出命故謂之顧顧將去意也釋尊捨苦行詣道樹受乳麋成正覺後即來仙苑遂以所成告五比丘特以緣熏機殊致有萬差束而言之不出大小二類故曰仙苑告成等此顯機由緣異也次言因機之別故世尊於金河顧命説涅槃時將一代聖教分同長者之半字教與滿字教故曰金河顧命等此顯教由機異也豈非下結成也謂如上原始要終統論能化所化能被所被既皆有所以則知今會若非乘時啓運縱是英靈倘乏昔緣亦無足考核參預於法華之高會是知下釋疑也謂靈山一會雖無凡材而見退席者須知會內必具影響顯法當機結緣之四衆是知五千輩乃釋尊為欲䇿進座中懷上慢者示有退席不堪進聞微妙乃顯法衆也至滿慈五百同蒙記莂者正顯往昔曾受如來密化以彰崇高之迹更令增道損生乃影響衆皆所以輔佛行化者所以下承上正明開顯經初所以放光現瑞者正創開發起敦請大教為會衆弄引作源也出定後稱揚二智難思之德俾上根捨權證實而久默之佛慧通方之大略至此始暢朽故火宅一喻初長者誘子以三車出宅出後不見有三但各賜以一大車則三車之名亦有誘出之功通乎大白之文軌矣此如如來為諸權小初説三乘拔苦及出界後惟授以一乘佛記故喻約果智及教道作開顯説顯中根之得記化城喻導師因衆人聞有寶所欣然發足將之而過五百次因愍其中退為化一城令止息已復滅所化使其前進以赴初心此如如來為退大者於界外説二涅槃暫解疲勞仍進以佛慧而令昔緣不墜故喻約理果作開顯説明下根之得記繫珠喻困乏人至親友家醉臥未起親友愍之乃以明珠乘醉繫其衣內緣事他往後見此人還因窘迫馳騁四方不知衣內有珠旋為指出而令五欲自資如從王子所聞覆説悟本有雖蒙繫以佛記旋又廢忘今承內熏增長復令得記始知一切智願猶在理性常恆鑿井喻渴乏須水者若鑿高原但見乾土知水尚遠如依權教修行由詮理未至故行不契真去道甚遠若於所穿得見濕土則知水必近矣如依此經聞解修習即近阿耨菩提此明處處悟物顯有多種方便也以上所詮若詞若義宛然在目似可盡知及詳喻意所陳始知經旨之深遠殊非淺陋所可一窺此結能被之教也自非下結所被之機謂諸衆生自無始來滯溺於生死海中無異沉流昏迷於第一義天遺失真性使非釋尊興大哀憐以曠遠之濟渡至一竣極之悲心焉能拔出蒙佛授記又焉能拯之破愚癡暗而朗悟於佛之知見哉自漢至唐六百餘載至永貽諸後云爾自漢下第三結示勝因祈願流通也謂自漢永平至唐貞觀中歷晉宋齊梁陳隋於此六百餘年內總論所譯諸經卷帙雖有四千餘軸但受持之盛者維法華耳下聯承上謂所以得有如是之盛者將非在昔於智勝所同結良緣故得如是機教相扣寧非塵點劫前之遺塵乎至聞而深敬了不生疑此亦威音所不輕攝受之餘績所使也豫見所益弘多故不揆其鄙拙輒於經首述而序之綜括其要俾受持者於未入文前先悟一經大旨庶令早淨六根仰慈尊之嘉會而見本尊常住耆闍崛山速成諸佛護念等四德進趣樂土玄猷得法華三昧而悟靈山一會儼然未散此聯首句既用本經六根若更遠指恐不宛切末結謂我縱博大其辭深長贊歎亦莫能窮其萬一上之數言不過略盡區區永貽諸後冀流通於無盡云爾
